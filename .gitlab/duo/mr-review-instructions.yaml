---
# Custom instructions for GitLab Duo Code Review
# Based on the Pajamas UX maintainer review checklist
# https://gitlab.com/gitlab-org/gitlab-services/design.gitlab.com/-/blob/main/doc/maintainer-checklist.md

# This file defines custom review criteria that will be applied to specific files
# during merge request reviews. Instructions are grouped by name and can target
# multiple file patterns using glob syntax.
instructions:
  - name: Content Quality and Writing Standards
    fileFilters:
      - 'contents/**/*.md'
    instructions: |
      1. Check for grammar and spelling errors.
      1. Verify the text follows the GitLab documentation style guide. Pay special attention to the voice and tone guidelines, and the punctuation rules. https://gitlab.com/gitlab-org/gitlab/-/blob/master/doc/development/documentation/styleguide/_index.md
      1. Sections and paragraphs must be concise, avoiding unnecessary repetition or wordiness.
      1. Verify _emphasis_ and **strong** markdown formatting is used sparingly.
      1. Ensure text is simple and clear, understandable without additional background information.
      1. Use "For example" instead of "e.g.".
      1. Avoid "should" statements - use direct instructions instead.
      1. Use full, descriptive sentences. For example, prefer "Use cross-column colors to highlight..." over "Use to highlight...".
      1. Ensure similar or related content is grouped together.
      1. Verify terminology (technical or GitLab-specific) is used correctly.
      1. Use singular form when referencing components and users. For example: "A badge can have an icon" instead of "Badges can have an icon".
      1. Check that unneeded spaces and comments are removed.

  - name: Component Documentation Standards
    fileFilters:
      - 'contents/components/**/*.md'
    instructions: |
      1. Verify component documentation follows the component template: https://gitlab.com/gitlab-org/gitlab-services/design.gitlab.com/-/raw/main/pages/components/template.md
      1. Ensure empty or incomplete required sections have a TODO for future completion.
      1. Verify component demos are used whenever possible. If not possible, a TODO should be present.
      1. Check that related components are added as applicable (alternative components or components that are usually paired). Related components should be listed in the frontmatter using the `related:` field with kebab-case slugs (for example, `alert`, `toast`, `broadcast-message`), not full paths or component titles.
      1. Ensure keyboard navigation is documented in the accessibility section.
      1. Verify text to be read by screen readers is documented in the accessibility section.

  - name: Cross-References and Links
    fileFilters:
      - 'contents/**/*.md'
    instructions: |
      1. Verify all links are formatted correctly.
      1. Ensure component mentions are cross-linked to their respective component pages. That is, a mention of an alert should link to the alert component page. For example: "If you need to communicate system status, consider using an [alert](/components/alert) instead."

  - name: Changeset Reminder for gitlab-ui Package Changes
    fileFilters:
      - 'packages/gitlab-ui/src/**/*.vue'
      - 'packages/gitlab-ui/src/**/*.scss'
      - 'packages/gitlab-ui/src/**/*.css'
      - 'packages/gitlab-ui/src/**/*.js'
      - 'packages/gitlab-ui/translations.js'
      - 'packages/gitlab-ui/tailwind.defaults.js'
      - 'packages/gitlab-ui/tailwind_cqs_mqs_plugin.js'
    instructions: |
      1. These files are published as part of the `@gitlab/ui` npm package.
      1. Check whether the merge request includes a changeset file in the `.changeset/` directory.
      1. If no changeset is present, remind the author that a changeset is likely needed for these changes. Link to the guidelines: https://gitlab.com/gitlab-org/gitlab-services/design.gitlab.com/-/blob/main/doc/publishing-packages.md
      1. A changeset is NOT needed if the change is not observable in the published package (for example, code comments only, or refactoring with no behavior change).
      1. Note: Changes to Storybook stories (`*.stories.js`), tests (`*.spec.js`, `*.spec.scss`), documentation (`packages/gitlab-ui/doc/`), and build or CI configuration are excluded from the published package and do not require a changeset.

  - name: Changesets
    fileFilters:
      - '.changeset/*.md'
    instructions: |
      1. Ensure changesets follow the guidelines in https://gitlab.com/gitlab-org/gitlab-services/design.gitlab.com/-/blob/main/doc/publishing-packages.md.
