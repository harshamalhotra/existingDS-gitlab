schemaVersion: 2.2.0
variables:
  registry-root: registry.gitlab.com
components:
  - name: tooling-container
    attributes:
      gl/inject-editor: true
    container:
      image: "registry.gitlab.com/gitlab-org/gitlab-build-images/workspaces/ubuntu-24.04:20250414234733-golang-1.23-node-22.12-yarn-1.22-ruby-3.4.2-rust-1.85-php-8.4.5-java-21.0.6-python-3.13-docker-27.5.1@sha256:3b3fb1374084a20349019b88302fcc8ace1a3de5ab09465668d09f95a0eaa34b"
      env:
        - name: STORYBOOK_HOST
          value: "0.0.0.0"
      endpoints:
        - name: storybook
          targetPort: 9001
          secure: true
          protocol: http
        - name: docs
          targetPort: 2018
commands:
  - id: install-dependencies
    exec:
      component: tooling-container
      commandLine: "cd ../../projects/design.gitlab.com && curl -fsSL https://deb.nodesource.com/setup_current.x | sudo -E bash - && sudo apt-get install -y nodejs && yarn install && yarn run start:full"

events:
  postStart:
    - install-dependencies