<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitLab Sidebar Clone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'gl-bg-subtle': '#fbfafd', /* var(--gl-color-neutral-10) */
            'gl-hover': 'rgba(83, 81, 88, 0.16)', /* Approximation of hover */
            'gl-active': 'rgba(83, 81, 88, 0.24)', /* var(--gl-action-neutral-background-color-active) */
            'gl-purple': '#7759c2', /* var(--gl-color-purple-500) */
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 font-sans">
  <!-- Sidebar Container -->
  <!-- Width is 16rem ($sidebar-width), bg is gl-bg-subtle, border right, h-full fixed -->
  <aside class="w-64 h-screen fixed left-0 top-0 bg-gl-bg-subtle border-r border-gray-200 flex flex-col z-40">
    
    <!-- Header / Logo Area -->
    <div class="h-14 flex items-center px-4 mb-2 mt-2">
      <!-- Placeholder Logo -->
      <div class="w-8 h-8 bg-gl-purple rounded flex items-center justify-center text-white font-bold mr-3 shadow-sm">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
        </svg>
      </div>
      <span class="font-semibold text-gray-900 tracking-tight">GitLab Clone</span>
    </div>

    <!-- Navigation List -->
    <nav class="flex-1 overflow-y-auto px-2 py-2">
      <ul class="space-y-[1px]">
        <!-- Active Item -->

          <a href="#" class="relative flex items-center px-3 py-2 text-sm font-medium text-gray-900 bg-gl-active rounded-md before:absolute before:inset-y-1 before:left-[3px] before:w-[3px] before:bg-gl-purple before:rounded-full">
            <svg class="w-4 h-4 mr-3 text-gray-700" fill="currentColor" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M8.38 1.353L8 1.131l-.38.222-7.25 4.25a.75.75 0 0 0 .76 1.294l.87-.51V14h12V6.387l.87.51a.75.75 0 1 0 .76-1.294l-7.25-4.25zm4.12 4.154L8 2.87 3.5 5.507V12.5H6V8h4v4.5h2.5V5.507zM8.5 9.5v3h-1v-3h1z"/></svg>
            Overview
          </a>
        </li>
        <!-- Inactive Item -->
        <li>
          <a href="#" class="relative flex items-center px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gl-hover rounded-md transition-colors">
            <svg class="w-4 h-4 mr-3 text-gray-500" fill="currentColor" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M9.5 14.5l-6-2.5V4l6-2.5v13zm-6.885-1.244A1 1 0 0 1 2 12.333V3.667a1 1 0 0 1 .615-.923L8.923.115A1.5 1.5 0 0 1 11 1.5V2h1.25c.966 0 1.75.783 1.75 1.75v8.5A1.75 1.75 0 0 1 12.25 14H11v.5a1.5 1.5 0 0 1-2.077 1.385l-6.308-2.629zM11 12.5h1.25a.25.25 0 0 0 .25-.25v-8.5a.25.25 0 0 0-.25-.25H11v9z"/></svg>
            Repositories

        </li>
        <!-- Inactive Item -->
        <li>
          <a href="#" class="relative flex items-center px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gl-hover rounded-md transition-colors">
            <svg class="w-4 h-4 mr-3 text-gray-500" fill="currentColor" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M3 2.5h6a.5.5 0 0 1 .5.5v10a.5.5 0 0 1-.5.5H3a.5.5 0 0 1-.5-.5V3a.5.5 0 0 1 .5-.5zM1 3a2 2 0 0 1 2-2h6a2 2 0 0 1 1.97 1.658l2.913 1.516a1.75 1.75 0 0 1 .744 2.36l-3.878 7.45a.753.753 0 0 1-.098.145c-.36.526-.965.871-1.651.871H3a2 2 0 0 1-2-2V3zm10 7.254l2.297-4.413a.25.25 0 0 0-.106-.337L11 4.364v5.89z"/></svg>

          </a>

          </a>
        </li>
      </ul>
    </nav>
    
    <!-- User / Bottom area -->
    <div class="p-4 mt-auto mb-2 mx-2">
      <a href="#" class="flex items-center text-sm font-medium text-gray-700 hover:bg-gl-hover p-2 rounded-md transition-colors">
        <!-- GitLab uses an avatar here -->
        <div class="w-6 h-6 rounded-full bg-gray-300 mr-3 flex items-center justify-center text-xs text-white">U</div>
        User Account
      </a>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="ml-64 p-8">
    <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
    <p class="mt-4 text-gray-600">This page demonstrates the standalone sidebar mimicking GitLab's Pajamas design system based on specifications from the repository.</p>
  </main>

</html>
