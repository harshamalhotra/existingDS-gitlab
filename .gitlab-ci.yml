stages:
  - pre-build
  - test
  - build
  - deploy
  - publish
  - manual

workflow:
  rules:
    - if: '$CI_MERGE_REQUEST_IID'
      variables:
        CACHE_PREFIX: '${CI_MERGE_REQUEST_IID}'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      variables:
        CACHE_PREFIX: 'main'

default:
  image: alpine:latest
  interruptible: true
  artifacts:
    expire_in: 30 days
  tags:
    - gitlab-org

.is-design-gitlab-com-default-branch: &is-design-gitlab-com-default-branch
  if: '$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH && $CI_PROJECT_PATH == "gitlab-org/gitlab-services/design.gitlab.com"'

variables:
  # We should double-check whether the remaining Docker in Docker jobs need the following
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""  # https://gitlab.com/gitlab-org/gitlab-runner/issues/4501

include:
  - template: Jobs/Code-Quality.gitlab-ci.yml  # https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Jobs/Code-Quality.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml  # https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Jobs/Dependency-Scanning.latest.gitlab-ci.yml
  - template: Jobs/SAST.latest.gitlab-ci.yml  # https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Jobs/SAST.latest.gitlab-ci.yml
  - project: gitlab-org/frontend/untamper-my-lockfile
    file: 'templates/merge_request_pipelines.yml'
  - component: ${CI_SERVER_FQDN}/gitlab-org/components/danger-review/danger-review@2.1.0
    inputs:
      job_stage: "pre-build"
      gitlab_dangerfiles_version: "4.9.0"

###############
#
## Overrides for jobs from templates
#
###############

# TODO: Remove this override for danger-review once GitLab UI is merged.
danger-review:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_LABELS =~ /pipeline:skip-danger/
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

code_quality:
  tags:
    - gitlab-org-docker
  rules:
    - when: always

dependency_scanning:
  # This can be executed immediately
  needs: []

sast:
  # This can be executed immediately
  needs: []

###############
#
## Custom Jobs
#
###############
.node-job:
  image: node:20.13-alpine
  before_script:
    - apk add --no-cache bash git
    - yarn install --frozen-lockfile

.build_cache:
  variables:
    CACHE_POLICY: pull
  cache:
    - key: "${CACHE_PREFIX}-nuxt"
      fallback_keys:
        - main-nuxt
      paths:
        - node_modules/
      policy: $CACHE_POLICY

check_links:
  extends:
    - .node-job
    - .build_cache
  stage: test
  needs: []
  allow_failure: true
  script:
    - yarn check-links

lint_and_test:
  extends:
    - .node-job
  stage: test
  needs: []
  script:
    - yarn test

.pages:
  extends:
    - .node-job
    - .build_cache
  stage: deploy
  needs: []
  publish: public
  variables:
    CACHE_POLICY: pull-push
    # Setting the default CURRENT_PAGES_URL, in order to make pages work for forks
    # CURRENT_PAGES_URL is set in the canonical project
    CURRENT_PAGES_URL: "${CI_PAGES_URL}"
  script:
    - apk add --no-cache gzip brotli
    - bash ./scripts/build.sh
    - ls -a public
    - echo "${CI_ENVIRONMENT_URL}" > environment_url.txt
    - echo "Pages accessible through ${CI_ENVIRONMENT_URL}"
  artifacts:
    paths:
      - public/*
      - environment_url.txt

production:
  extends:
    - .pages
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  pages:
    expire_in: never
  environment:
    name: "pages"
    url: "${CURRENT_PAGES_URL}"

review-app:
  extends:
    - .pages
  rules:
    - if: '$CI_MERGE_REQUEST_IID'
  pages:
    path_prefix: 'review-mr-${CI_MERGE_REQUEST_IID}'
    expire_in: "2 weeks"
  environment:
    name: "pages-review/MR-${CI_MERGE_REQUEST_IID}"
    url: "${CURRENT_PAGES_URL}"
    auto_stop_in: "2 weeks"

# Do not use `needs` (https://docs.gitlab.com/ci/yaml/needs/) on this job.
# It should only run if all previous stages have passed.
publish_npm_packages:
  extends:
    - .node-job
  stage: deploy
  resource_group: publish_npm_packages
  rules:
    - <<: *is-design-gitlab-com-default-branch
  script:
    - ./scripts/publish_npm_packages.mjs
