# Lefthook guide:
# https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md
pre-commit:
  parallel: true
  commands:
    eslint:
      glob: "*.{js,vue}"
      run: ./node_modules/.bin/eslint {staged_files}
    prettier:
      glob: "*.{js,mjs,cjs,ts,vue}'"
      run: ./node_modules/.bin/prettier --check {staged_files}
    markdown-lint:
      glob: "*.md"
      exclude:
        # This list should be kept in sync with the negated globs in
        # .markdownlint-cli2.yaml.
        - '.gitlab/**/*.md'
        - 'packages/gitlab-ui/src/vendor/**/*.md'
        - 'pages/components/template.md'
        - '**/node_modules/**'
        - '**/CHANGELOG*.md'
      run: ./node_modules/.bin/markdownlint-cli2 {staged_files} --no-globs

# This is a non git-hook-target which we use in CI
# in order to parallelize linting / spec execution
test-in-ci:
  parallel: true
  commands:
    eslint:
      run: yarn run lint:eslint --format gitlab
    markdownlint:
      run: yarn run lint:markdownlint
    prettier:
      run: yarn run lint:prettier
    unit_tests:
      run: yarn run test:unit
